version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: ticket_support_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ticket_net

  redis:
    image: redis:7-alpine
    container_name: ticket_support_redis
    ports:
      - "6379:6379"
    networks:
      - ticket_net

  auth-service:
    build:
      context: ./auth-service
    container_name: ticket_support_auth
    environment:
      - PORT=5001
      - MONGO_URL=mongodb://mongodb:27017/ticket_support
      - JWT_SECRET=supersecret123
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    depends_on:
      - mongodb
    networks:
      - ticket_net

  ticket-service:
    build:
      context: ./ticket-service
    container_name: ticket_support_ticket
    environment:
      - PORT=5002
      - MONGO_URL=mongodb://mongodb:27017/ticket_support
      - JWT_SECRET=supersecret123
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    depends_on:
      - mongodb
      - redis
    networks:
      - ticket_net

  notification-service:
    build:
      context: ./notification-service
    container_name: ticket_support_notification
    environment:
      - PORT=5003
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    depends_on:
      - redis
    networks:
      - ticket_net

  api-gateway:
    build:
      context: ./api-gateway
    container_name: ticket_support_gateway
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - ticket-service
      - notification-service
      - frontend
    networks:
      - ticket_net

  frontend:
    build:
      context: ./Client
    container_name: ticket_support_frontend
    environment:
      - NODE_ENV=development
    # Use dev mapping to allow hot reload via Vite if mapped locally
    volumes:
      - ./Client:/app
      - /app/node_modules
    networks:
      - ticket_net

volumes:
  mongo_data:

networks:
  ticket_net:
    driver: bridge
